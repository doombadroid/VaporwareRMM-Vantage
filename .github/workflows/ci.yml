name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm/action-setup MUST run before setup-node, otherwise the
      # `cache: pnpm` directive can't locate the binary it needs to
      # compute the cache key. Pinned major version; pnpm version
      # itself reads from packageManager in package.json (9.15.0
      # currently) — specifying both produces ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DEV_ALLOW_UNENCRYPTED_SECRETS: "1"
      VANTAGE_TEST_PG_URL: postgres://postgres:ci-test@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      # `go test ./packages/...` from the workspace root fails with
      # "directory prefix packages does not contain modules listed
      # in go.work" because the workspace root isn't itself a module.
      # cd into each workspace member and run the per-module test
      # invocation. -p 1 serializes packages within a module so the
      # three test files that share a Postgres schema (db, events,
      # main) don't race each other.
      - name: Run vantage tests
        working-directory: packages/vantage
        run: go test -p 1 ./...
      - name: Run models tests
        working-directory: packages/models
        run: go test ./...

  test-dashboard:
    name: Dashboard typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:dashboard

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-go, test-dashboard]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      # Codex #5 (Edge) regression: PR builds compile images for
      # verification but DO NOT push. Push is reserved for the
      # publish workflow that runs only on push@main with
      # packages:write permission. This job has contents:read only.
      - name: Build vantage image (verify only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/vantage/Dockerfile
          push: false
          tags: vantage:${{ github.sha }}
      - name: Build dashboard image (verify only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: false
          tags: vantage-dashboard:${{ github.sha }}
