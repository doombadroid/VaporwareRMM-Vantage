services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set in .env)}
      POSTGRES_DB: vantage
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [vaporrmm-vantage-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks: [vaporrmm-vantage-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vantage:
    build:
      context: .
      dockerfile: packages/vantage/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://vantage:${POSTGRES_PASSWORD}@postgres:5432/vantage?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars, openssl rand -base64 48)}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:?SECRETS_ENCRYPTION_KEY is required (32 bytes base64, openssl rand -base64 32)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required for first-run admin bootstrap}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      VANTAGE_PORT: "9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [vaporrmm-vantage-internal]

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
    depends_on:
      - vantage
    networks: [vaporrmm-vantage-internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${BIND_ADDR:-127.0.0.1}:80:80"
      - "${BIND_ADDR:-127.0.0.1}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    depends_on:
      - vantage
      - dashboard
    networks: [vaporrmm-vantage-internal]

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  vaporrmm-vantage-internal:
    driver: bridge
